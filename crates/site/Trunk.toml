[build]
target = "index.html"
# Served at the apex of the custom domain (playwright-rust.dev), so the public
# URL is the site root.
public_url = "/"

[tools]
# Pin the Tailwind v4 standalone binary (Trunk defaults to a v3 release, which
# can't parse our v4 `@import "tailwindcss"` / `@theme` input.css).
tailwindcss = "4.3.0"

[watch]
# `copy-dir public/receipts` re-copies the receipts into dist on every build.
# Without ignoring the generated receipts (and the dist output), the file
# watcher sees that and retriggers the build, looping forever under
# `trunk serve`. Receipts are generated artifacts, not source, so never watch
# them; the copy-dir still runs at build time.
ignore = ["public/receipts", "dist"]
